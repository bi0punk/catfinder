services:
  app:
    build: .
    container_name: catfinder
    ports:
      - "${WEB_PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      - ./captures:/app/captures
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
